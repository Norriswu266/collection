apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      # imagePullSecrets:
      #   - name: acr-auth
      containers:
        - name: api
          image: norrisacr.azurecr.io/api:9d69cec0fa8be6d4255e25648b78fac094115643
          ports:
            - containerPort: 3000
