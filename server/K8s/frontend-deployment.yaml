apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: norrisacr.azurecr.io/frontend:3c22982724c146dfb94306819977903b027a50f0
          imagePullPolicy: Always
          ports:
            - containerPort: 80