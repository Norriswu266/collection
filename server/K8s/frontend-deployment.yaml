apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: norrisacr.azurecr.io/frontend:53ea0225813be717abd3963c6d7d43976334d1cc
          imagePullPolicy: Always
          ports:
            - containerPort: 80