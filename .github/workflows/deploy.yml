name: Build and Deploy to AKS

on:
  push:
    branches:
      - main

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push API Image
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image api:${{ github.sha }} \
            ./server

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push Frontend Image
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image frontend:${{ github.sha }} \
            ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_NAME }}

      - name: Deploy API
        run: |
          kubectl set image deployment/api api=${{ secrets.ACR_NAME }}.azurecr.io/api:${{ github.sha }}
          kubectl rollout status deployment/api

      - name: Deploy Frontend
        run: |
          kubectl set image deployment/frontend frontend=${{ secrets.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}
          kubectl rollout status deployment/frontend
