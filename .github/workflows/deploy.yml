name: Build and Deploy to AKS

on:
  push:
    branches:
      - main

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push API Image
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image api:${{ github.sha }} \
            --image api:latest \
            ./server

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push Frontend Image
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image frontend:${{ github.sha }} \
            --image frontend:latest \
            ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API
        run: |
          az aks command invoke \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_NAME }} \
            --command "kubectl set image deployment/api api=${{ secrets.ACR_NAME }}.azurecr.io/api:${{ github.sha }} && kubectl rollout status deployment/api"

      - name: Deploy Frontend
        run: |
          az aks command invoke \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_NAME }} \
            --command "kubectl set image deployment/frontend frontend=${{ secrets.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }} && kubectl rollout status deployment/frontend"
