name: Build and Deploy to AKS

on:
  push:
    branches:
      - main

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push API Image
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image api:${{ github.sha }} \
            --image api:latest \
            ./server

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push Frontend Image
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image frontend:${{ github.sha }} \
            --image frontend:latest \
            ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Update image tags in manifests
        run: |
          sed -i "s|norrisacr.azurecr.io/api:.*|norrisacr.azurecr.io/api:${{ github.sha }}|" server/K8s/deployment.yaml
          sed -i "s|norrisacr.azurecr.io/frontend:.*|norrisacr.azurecr.io/frontend:${{ github.sha }}|" server/K8s/frontend-deployment.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add server/K8s/deployment.yaml server/K8s/frontend-deployment.yaml
          git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
